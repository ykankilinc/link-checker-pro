<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
    <title>Link Checker Pro</title>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">🔗</span>
                <h1>Link Checker <span>Pro</span></h1>
            </div>
            <div class="status-indicator">
                <span id="scan-status">Ready</span>
                <div class="dot"></div>
            </div>
        </header>

        <main>
            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="label">Total Links</div>
                    <div class="value" id="stat-total">0</div>
                </div>
                <div class="stat-card valid">
                    <div class="label">Valid (200)</div>
                    <div class="value" id="stat-valid">0</div>
                </div>
                <div class="stat-card broken">
                    <div class="label">Broken (404)</div>
                    <div class="value" id="stat-broken">0</div>
                </div>
                <div class="stat-card redirected">
                    <div class="label">Redirects</div>
                    <div class="value" id="stat-redirected">0</div>
                </div>
                <div class="stat-card warnings">
                    <div class="label">Warnings</div>
                    <div class="value" id="stat-warning">0</div>
                </div>
            </div>

            <div class="actions">
                <button id="start-btn" class="primary-btn">Start Scan</button>
                <button id="stop-btn" class="secondary-btn" disabled>Stop</button>
            </div>

            <div class="controls-section">
                <button id="export-csv" class="tertiary-btn">Export Results to CSV</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Link Checker Pro. Developed by <a href="https://github.com/ykankilinc" target="_blank" class="signature">ykankilinc</a>.</p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
